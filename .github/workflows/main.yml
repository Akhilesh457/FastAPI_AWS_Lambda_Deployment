name: FastAPI CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  CI:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'   # built-in pip cache (better than manual venv cache)

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4️⃣ Run tests (if pytest exists)
      - name: Run tests
        run: |
          pip install pytest
          pytest || echo "No tests found"

      # 5️⃣ Create deployment zip
      - name: Create zip package
        run: |
          zip -r app.zip . -x "venv/*" ".git/*"

      # 6️⃣ Upload artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fastapi-app
          path: app.zip
